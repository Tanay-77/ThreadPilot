<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreadPilot</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      width: 240px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 10px;
      color: #555;
      margin-top: 1px;
    }

    /* Status section */
    .status-section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3a3a3a;
      flex-shrink: 0;
      transition: background 0.3s ease;
    }

    .status-dot.active {
      background: #5fa85f;
      box-shadow: 0 0 6px rgba(95, 168, 95, 0.5);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.6;
      }
    }

    #status-text {
      color: #888;
      font-size: 11px;
    }

    /* Actions */
    .actions {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s ease;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .btn-primary:hover {
      background: #ddd;
      border-color: #ddd;
    }

    .btn-secondary {
      background: #1a1a1a;
      color: #ccc;
      border-color: #2a2a2a;
    }

    .btn-secondary:hover {
      background: #232323;
      color: #fff;
      border-color: #333;
    }

    .btn svg {
      flex-shrink: 0;
    }

    /* Shortcut hint */
    .shortcut {
      padding: 0 16px 14px;
    }

    .shortcut-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #4a4a4a;
    }

    kbd {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: #666;
    }

    /* Footer */
    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid #1a1a1a;
      font-size: 10px;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer a {
      color: #444;
      text-decoration: none;
    }

    .footer a:hover {
      color: #888;
    }

    /* Not-on-ChatGPT message */
    #not-chatgpt {
      display: none;
      padding: 20px 16px;
      text-align: center;
    }

    #not-chatgpt .emoji {
      font-size: 28px;
      margin-bottom: 8px;
    }

    #not-chatgpt h2 {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 6px;
    }

    #not-chatgpt p {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }

    .chatgpt-link {
      display: inline-block;
      margin-top: 12px;
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      font-size: 11px;
      color: #ccc;
      text-decoration: none;
      transition: all 0.15s;
    }

    .chatgpt-link:hover {
      background: #232323;
      color: #fff;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <circle cx="6" cy="5" r="2" fill="white" />
        <circle cx="6" cy="12" r="2" fill="white" />
        <circle cx="6" cy="19" r="2" fill="white" />
        <line x1="9" y1="5" x2="20" y2="5" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="9" y1="12" x2="20" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" />
        <line x1="9" y1="19" x2="16" y2="19" stroke="white" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
    <div>
      <h1>ThreadPilot</h1>
      <p>ChatGPT · Gemini · Claude</p>
    </div>
  </div>

  <!-- Status -->
  <div class="status-section" id="main-content">
    <div class="status-indicator">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actions">
    <button class="btn btn-primary" id="btn-open">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2" />
        <line x1="15" y1="3" x2="15" y2="21" />
      </svg>
      Open Navigator
    </button>
    <button class="btn btn-secondary" id="btn-refresh">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <polyline points="23 4 23 10 17 10" />
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
      </svg>
      Refresh Messages
    </button>
  </div>

  <!-- Keyboard shortcut hint -->
  <div class="shortcut" id="shortcut">
    <div class="shortcut-pill">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#4a4a4a" stroke-width="2"
        stroke-linecap="round">
        <rect x="2" y="7" width="20" height="14" rx="2" />
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
      </svg>
      Shortcut: <kbd>Alt</kbd> + <kbd>T</kbd>
    </div>
  </div>

  <!-- Not on ChatGPT -->
  <div id="not-chatgpt">
    <div class="emoji">🧭</div>
    <h2>Open an AI chat to begin</h2>
    <p>ThreadPilot works on ChatGPT, Gemini, and Claude.</p>
    <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px;">
      <a href="https://chatgpt.com" target="_blank" class="chatgpt-link">ChatGPT →</a>
      <a href="https://gemini.google.com" target="_blank" class="chatgpt-link">Gemini →</a>
      <a href="https://claude.ai" target="_blank" class="chatgpt-link">Claude →</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>ThreadPilot v1.1</span>
    <span>MV3</span>
  </div>

  <script src="popup.js"></script>
</body>

</html>
